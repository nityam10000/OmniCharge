spring.application.name=OperatorPlanManagement
server.port=8086

spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:9999/config},optional:file:.env[.properties],optional:file:../.env[.properties]

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/operatorPlan
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================= EUREKA =================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

# ================= REDIS =================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.redis.time-to-live=60000

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=/health
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# ================= ZIPKIN / TRACING =================
# Sample 100% of requests (use 0.1 for 10% in production)
management.tracing.sampling.probability=1.0
# Zipkin server URL
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans}
management.zipkin.tracing.connect-timeout=5000
management.zipkin.tracing.read-timeout=5000
# Enable tracing
management.tracing.enabled=true

# ================= LOGGING =================
logging.level.org.springframework.cache=TRACE
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.file.path=logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.com.oprationPlanManagement=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN

# Prevent Zipkin failures from propagating to request threads
spring.zipkin.sender.type=web

# Add this — makes the reporter non-blocking and swallows send errors
spring.zipkin.enabled=true