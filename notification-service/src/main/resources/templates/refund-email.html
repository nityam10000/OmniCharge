<!DOCTYPE html>
<html lang="en">
<body style="margin:0;padding:0;background-color:#eef2f7;font-family:Arial,sans-serif;color:#1e293b;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;background-color:#eef2f7;">
    <tr>
        <td align="center" style="padding:28px 16px;">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;border-collapse:collapse;background:#ffffff;border-radius:20px;overflow:hidden;">
                <tr>
                    <td style="padding:28px 32px;background:linear-gradient(135deg, {{gradient_start}}, {{gradient_end}});color:#ffffff;">
                        <div style="font-size:13px;letter-spacing:1.6px;text-transform:uppercase;opacity:0.9;">OmniCharge</div>
                        <div style="margin-top:12px;font-size:28px;font-weight:700;">{{title}}</div>
                        <div style="margin-top:10px;font-size:15px;line-height:1.6;opacity:0.95;">{{intro}}</div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:24px 32px 20px 32px;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;background:{{card_bg}};border:1px solid {{card_border}};border-radius:14px;">
                            <tr>
                                <td colspan="2" style="padding:16px 20px;font-size:16px;font-weight:700;color:#0f172a;border-bottom:1px solid {{card_border}};">
                                    {{card_title}}
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:14px 20px;font-size:13px;font-weight:700;color:#475569;border-right:1px solid {{card_border}};width:34%;">
                                    Refund Info
                                </td>
                                <td style="padding:14px 20px;font-size:14px;line-height:1.8;color:{{card_text}};">
                                    {{message}}
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 32px 32px 32px;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;background:#f8fafc;border-radius:14px;">
                            <tr>
                                <td style="padding:18px 20px;font-size:13px;line-height:1.8;color:#475569;">
                                    Refund settlement time depends on your payment provider and bank.
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 32px 28px 32px;text-align:center;font-size:12px;line-height:1.6;color:#64748b;">
                        This is an automated message from OmniCharge. Please do not reply directly to this email.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
