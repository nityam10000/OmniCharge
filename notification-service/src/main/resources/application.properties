spring.application.name=notificationservice
server.port=8085

spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:9999/config},optional:file:.env[.properties],optional:file:../.env[.properties]

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# ================= EUREKA =================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

# ================= REDIS =================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.redis.time-to-live=60000

# ================= RABBITMQ =================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# ================= MAIL =================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.protocols=${MAIL_SMTP_SSL_PROTOCOLS:TLSv1.2}

# ================= TWILIO =================
twilio.accountSid=${TWILIO_ACCOUNT_SID}
twilio.authToken=${TWILIO_AUTH_TOKEN}
twilio.whatsappNumber=${TWILIO_WHATSAPP_NUMBER}

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# ================= ZIPKIN / TRACING =================
# Sample 100% of requests (use 0.1 for 10% in production)
management.tracing.sampling.probability=1.0
# Zipkin server URL
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans}
# Enable tracing
management.tracing.enabled=true

# ================= LOGGING =================
logging.level.org.springframework.cache=TRACE
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.file.path=logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.com.omnicharge.notification=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.mail=INFO

# Prevent Zipkin failures from propagating to request threads
spring.zipkin.sender.type=web

# Add this — makes the reporter non-blocking and swallows send errors
spring.zipkin.enabled=true