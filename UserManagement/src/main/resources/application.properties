spring.application.name=UserManagement
server.port=8081

spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:9999/config},optional:file:.env[.properties],optional:file:../.env[.properties]

# ================= SECURITY =================
# Used by JwtTokenFilter to validate Authorization: Bearer <token>
jwt.secret=${JWT_SECRET}

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/userservicedb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ================= EUREKA =================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

# ================= REDIS =================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.redis.time-to-live=60000

# ================= RABBITMQ =================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Add these ↓ — auto-reconnect with retry
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.max-attempts=5
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=3000
spring.rabbitmq.template.retry.max-attempts=5

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# ================= ZIPKIN / TRACING =================
# Sample 100% of requests (use 0.1 for 10% in production)
management.tracing.sampling.probability=1.0
# Zipkin server URL
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans}
management.zipkin.tracing.connect-timeout=5000
management.zipkin.tracing.read-timeout=5000
# Enable tracing
management.tracing.enabled=true

# ================= LOGGING =================
logging.level.org.springframework.cache=TRACE
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.file.path=logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.com.omnicharge.usermanagement=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN
logging.level.io.micrometer.tracing=DEBUG

# Prevent Zipkin failures from propagating to request threads
spring.zipkin.sender.type=web

# Add this — makes the reporter non-blocking and swallows send errors
spring.zipkin.enabled=true

# Force Docker env vars to win over config server values
spring.cloud.config.override-system-properties=false
spring.cloud.config.allow-override=true
spring.cloud.config.override-none=true