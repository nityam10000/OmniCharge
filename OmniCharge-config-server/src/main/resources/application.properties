spring.application.name=OmniCharge-config-server

server.servlet.context-path=/config
server.port=9999

# ================= GIT CONFIG SOURCE =================
spring.cloud.config.server.git.uri=${CONFIG_GIT_URI:https://github.com/nityam10000/omniCharge-cloud-config.git}

# ================= EUREKA =================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# ================= ZIPKIN / TRACING =================
# Sample 100% of requests (use 0.1 for 10% in production)
management.tracing.sampling.probability=1.0
# Zipkin server URL
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans}
# Enable tracing
management.tracing.enabled=true

# ================= LOGGING =================
logging.level.org.springframework.cache=TRACE
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.file.path=logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.com.omnicharge=INFO
logging.level.org.springframework.web=INFO
