spring.application.name=APIGateway
server.port=8087

spring.config.import=optional:configserver:http://localhost:9999/config

spring.main.web-application-type=reactive

# PROMETHEUS ROUTES (FIRST - HIGHEST PRIORITY)
spring.cloud.gateway.server.webflux.routes[0].id=USERMANAGEMENT_PROMETHEUS
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USERMANAGEMENT
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/metrics/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/users/metrics/?, /actuator/prometheus

spring.cloud.gateway.server.webflux.routes[1].id=AUTHSERVICE_PROMETHEUS
spring.cloud.gateway.server.webflux.routes[1].uri=lb://AUTHSERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth/metrics/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/auth/metrics/?, /actuator/prometheus

spring.cloud.gateway.server.webflux.routes[2].id=RECHARGEPROCESSING_PROMETHEUS
spring.cloud.gateway.server.webflux.routes[2].uri=lb://RECHARGEPROCESSING
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/recharge/metrics/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=/recharge/metrics/?, /actuator/prometheus

spring.cloud.gateway.server.webflux.routes[3].id=PAYMENTSERVICE_PROMETHEUS
spring.cloud.gateway.server.webflux.routes[3].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/transaction/metrics/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/transaction/metrics/?, /actuator/prometheus

spring.cloud.gateway.server.webflux.routes[4].id=OPERATORPLANMANAGEMENT_PROMETHEUS
spring.cloud.gateway.server.webflux.routes[4].uri=lb://OPERATORPLANMANAGEMENT
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/operators/metrics/**,/plans/metrics/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/(operators|plans)/metrics/?, /actuator/prometheus

spring.cloud.gateway.server.webflux.routes[5].id=NOTIFICATIONSERVICE_PROMETHEUS
spring.cloud.gateway.server.webflux.routes[5].uri=lb://NOTIFICATIONSERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/notifications/metrics/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=RewritePath=/notifications/metrics/?, /actuator/prometheus

# ACTUATOR ROUTES (SECOND PRIORITY)
spring.cloud.gateway.server.webflux.routes[6].id=USERMANAGEMENT_ACTUATOR
spring.cloud.gateway.server.webflux.routes[6].uri=lb://USERMANAGEMENT
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/users/actuator/**
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/users/actuator/(?<segment>.*), /actuator/${segment}

spring.cloud.gateway.server.webflux.routes[7].id=RECHARGEPROCESSING_ACTUATOR
spring.cloud.gateway.server.webflux.routes[7].uri=lb://RECHARGEPROCESSING
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/recharge/actuator/**
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/recharge/actuator/(?<segment>.*), /actuator/${segment}

spring.cloud.gateway.server.webflux.routes[8].id=PAYMENTSERVICE_ACTUATOR
spring.cloud.gateway.server.webflux.routes[8].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/transaction/actuator/**
spring.cloud.gateway.server.webflux.routes[8].filters[0]=RewritePath=/transaction/actuator/(?<segment>.*), /actuator/${segment}

spring.cloud.gateway.server.webflux.routes[9].id=OPERATORPLANMANAGEMENT_ACTUATOR
spring.cloud.gateway.server.webflux.routes[9].uri=lb://OPERATORPLANMANAGEMENT
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/operators/actuator/**,/plans/actuator/**
spring.cloud.gateway.server.webflux.routes[9].filters[0]=RewritePath=/(operators|plans)/actuator/(?<segment>.*), /actuator/${segment}

spring.cloud.gateway.server.webflux.routes[10].id=AUTHSERVICE_ACTUATOR
spring.cloud.gateway.server.webflux.routes[10].uri=lb://AUTHSERVICE
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/auth/actuator/**
spring.cloud.gateway.server.webflux.routes[10].filters[0]=RewritePath=/auth/actuator/(?<segment>.*), /actuator/${segment}

spring.cloud.gateway.server.webflux.routes[11].id=NOTIFICATIONSERVICE_ACTUATOR
spring.cloud.gateway.server.webflux.routes[11].uri=lb://NOTIFICATIONSERVICE
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/notifications/actuator/**
spring.cloud.gateway.server.webflux.routes[11].filters[0]=RewritePath=/notifications/actuator/(?<segment>.*), /actuator/${segment}

# BUSINESS LOGIC ROUTES (THIRD - LOWEST PRIORITY)
spring.cloud.gateway.server.webflux.routes[12].id=USERMANAGEMENT
spring.cloud.gateway.server.webflux.routes[12].uri=lb://USERMANAGEMENT
spring.cloud.gateway.server.webflux.routes[12].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[13].id=RECHARGEPROCESSING
spring.cloud.gateway.server.webflux.routes[13].uri=lb://RECHARGEPROCESSING
spring.cloud.gateway.server.webflux.routes[13].predicates[0]=Path=/recharge/**

spring.cloud.gateway.server.webflux.routes[14].id=PAYMENTSERVICE
spring.cloud.gateway.server.webflux.routes[14].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.server.webflux.routes[14].predicates[0]=Path=/transaction/**

spring.cloud.gateway.server.webflux.routes[15].id=OPERATORPLANMANAGEMENT
spring.cloud.gateway.server.webflux.routes[15].uri=lb://OPERATORPLANMANAGEMENT
spring.cloud.gateway.server.webflux.routes[15].predicates[0]=Path=/operators/**,/plans/**

spring.cloud.gateway.server.webflux.routes[16].id=AUTHSERVICE
spring.cloud.gateway.server.webflux.routes[16].uri=lb://AUTHSERVICE
spring.cloud.gateway.server.webflux.routes[16].predicates[0]=Path=/auth/**

# Logging Configuration
logging.file.path=logs
logging.file.max-size=10MB
logging.file.max-history=30
logging.level.root=INFO
logging.level.com.omnicharge.apigateway=INFO
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.security=INFO
logging.level.io.jsonwebtoken=INFO