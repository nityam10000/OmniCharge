spring.application.name=RechargeProcessing
server.port=8083

spring.config.import=optional:configserver:http://localhost:9999/config

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://localhost:5432/rechargeprocessingdb
spring.datasource.username=postgres
spring.datasource.password=Bj12214846@
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ================= EUREKA =================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.instance.hostname=localhost

# ================= REDIS =================
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.redis.time-to-live=60000

# ================= FEIGN + RESILIENCE4J =================
spring.cloud.openfeign.circuitbreaker.enabled=true

resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.default.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.default.minimum-number-of-calls=5

# ================= RETRY CONFIG =================
resilience4j.retry.instances.OPERATORPLANMANAGEMENT.max-attempts=3
resilience4j.retry.instances.OPERATORPLANMANAGEMENT.wait-duration=2s
resilience4j.retry.instances.OPERATORPLANMANAGEMENT.enable-exponential-backoff=true
resilience4j.retry.instances.OPERATORPLANMANAGEMENT.exponential-backoff-multiplier=2
resilience4j.retry.instances.OPERATORPLANMANAGEMENT.retry-exceptions=java.io.IOException,feign.FeignException

resilience4j.retry.instances.PAYMENTSERVICE.max-attempts=3
resilience4j.retry.instances.PAYMENTSERVICE.wait-duration=2s
resilience4j.retry.instances.PAYMENTSERVICE.enable-exponential-backoff=true
resilience4j.retry.instances.PAYMENTSERVICE.exponential-backoff-multiplier=2
resilience4j.retry.instances.PAYMENTSERVICE.retry-exceptions=java.io.IOException,feign.FeignException

resilience4j.retry.instances.USERMANAGEMENT.max-attempts=3
resilience4j.retry.instances.USERMANAGEMENT.wait-duration=2s
resilience4j.retry.instances.USERMANAGEMENT.enable-exponential-backoff=true
resilience4j.retry.instances.USERMANAGEMENT.exponential-backoff-multiplier=2
resilience4j.retry.instances.USERMANAGEMENT.retry-exceptions=java.io.IOException,feign.FeignException

# ================= RABBITMQ =================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.prometheus.metrics.export.enabled=true

# ================= ZIPKIN / TRACING =================
# Sample 100% of requests (use 0.1 for 10% in production)
management.tracing.sampling.probability=1.0
# Zipkin server URL
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Enable tracing
management.tracing.enabled=true

# ================= LOGGING =================
logging.level.org.springframework.cache=TRACE
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.file.path=logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.com.omnicharge.rechargeprocessing=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN